<div class="detail-page" *ngIf="product">
  <div class="detail-inner">
    <a routerLink="/" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Volver al catálogo
    </a>

    <div class="detail-grid">
      <!-- Galería -->
      <div class="detail-gallery">
        <div class="main-img-wrap">
          <img [src]="product.images[selectedImg]" [alt]="product.shortName" class="main-img" />
        </div>
        <div class="thumbs" *ngIf="product.images.length > 1">
          <button
            *ngFor="let img of product.images; let i = index"
            class="thumb-btn"
            [class.active]="i === selectedImg"
            (click)="selectedImg = i"
          >
            <img [src]="img" [alt]="product.shortName + ' ' + (i+1)" />
          </button>
        </div>
      </div>

      <!-- Info -->
      <div class="detail-info">
        <p class="detail-cat">{{ product.category }}</p>
        <h1 class="detail-name">{{ product.name }}</h1>
        <p class="detail-price">COP ${{ product.price | number:'1.0-0' }}</p>
        <p class="detail-desc" *ngIf="product.description">{{ product.description }}</p>

        <div class="detail-actions">
          <button class="btn-add-cart" (click)="addToCart()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="18" height="18">
              <path d="M6 2 3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
              <line x1="3" y1="6" x2="21" y2="6"/>
              <path d="M16 10a4 4 0 01-8 0"/>
            </svg>
            Agregar al Carrito
          </button>
          <button class="btn-wa" (click)="askInfo()">
            <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
              <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
            </svg>
            Preguntar por WhatsApp
          </button>
        </div>

        <div class="added-msg" [class.show]="justAdded">✦ Agregado al carrito</div>
      </div>
    </div>
  </div>
</div>

<div class="not-found" *ngIf="!product">
  <p>Producto no encontrado</p>
  <a routerLink="/" class="btn-primary">Volver al inicio</a>
</div>
