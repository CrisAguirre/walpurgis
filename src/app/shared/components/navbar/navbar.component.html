<nav class="navbar" [class.scrolled]="scrolled">
  <div class="nav-inner">
    <a routerLink="/" class="nav-logo">
      <img src="assets/logos/logo_wb.png" alt="Walpurgis Store" />
    </a>

    <ul class="nav-links">
      <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Inicio</a></li>
      <li><a routerLink="/" fragment="catalogo">Catálogo</a></li>
      <li><a routerLink="/" fragment="nosotros">Nosotros</a></li>
    </ul>

    <div class="nav-actions">
      <a routerLink="/carrito" class="cart-btn" aria-label="Carrito">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M6 2 3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 01-8 0"/>
        </svg>
        <span class="cart-badge" *ngIf="cartCount > 0">{{ cartCount }}</span>
      </a>

      <button class="menu-toggle" (click)="toggleMenu()" [class.open]="menuOpen" aria-label="Menú">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>

  <!-- Mobile menu -->
  <div class="mobile-menu" [class.open]="menuOpen">
    <a routerLink="/" (click)="closeMenu()">Inicio</a>
    <a routerLink="/" fragment="catalogo" (click)="closeMenu()">Catálogo</a>
    <a routerLink="/" fragment="nosotros" (click)="closeMenu()">Nosotros</a>
    <a routerLink="/carrito" (click)="closeMenu()">🛒 Carrito ({{ cartCount }})</a>
  </div>
</nav>
